name: Deploy Backend to GCP VM

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend  # all run steps execute in backend folder

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️⃣️ Generate .env file for build context
      - name: Create .env file
        run: |
          echo "PORT=5000" > .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env

      # 4️⃣ Build Docker image for production
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: edu-hub-backend:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      # 5️⃣ Save Docker image as tar file
      - name: Save Docker image
        run: |
          mkdir -p dist
          docker save edu-hub-backend:latest -o backend-image.tar
          echo "📊 Docker image size:"
          ls -lh backend-image.tar

      # 6️⃣ Compress docker-compose files and env
      - name: Archive deployment files
        run: |
          tar -czf deploy-files.tar.gz \
            docker-compose.prod.yml \
            docker-compose.yml \
            Dockerfile \
            scripts/start.sh \
            .env \
            backend-image.tar
          echo "📦 Archive size:"
          du -h deploy-files.tar.gz

      # 7️⃣ Validate deployment package on GitHub runner
      - name: Extract and validate deployment package
        run: |
          # Extract the archive to a temporary directory
          mkdir -p tmp-deploy
          tar -xzf deploy-files.tar.gz -C tmp-deploy
          
          # Change to the temporary directory
          cd tmp-deploy
          
          # Load the Docker image from the extracted tar
          docker load -i backend-image.tar
          
          # Start services using docker-compose
          docker compose -f docker-compose.prod.yml up -d
          
          # Wait for container to be ready
          sleep 5
          
          # Check container status
          docker ps
          
          # Test the health endpoint
          RESPONSE=$(curl -s http://localhost:5000/api/ping)
          echo "Backend response: $RESPONSE"
          
          # Validate response using jq
          MESSAGE=$(echo "$RESPONSE" | jq -r '.message')
          if [ "$MESSAGE" != "server is running" ]; then
            echo "Backend not responding correctly"
            exit 1
          fi
          
          # Show Docker image size
          echo "Listing all Docker images:"
          docker images
          IMAGE_NAME=edu-hub-backend
          IMAGE_TAG=latest
          SIZE_BYTES=$(docker inspect ${IMAGE_NAME}:${IMAGE_TAG} --format='{{.Size}}')
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "Docker image size: ${SIZE_MB} MB"
          
          # Cleanup - stop containers and remove image
          docker compose -f docker-compose.prod.yml down
          docker rmi edu-hub-backend:latest || true
          
          # Return to working directory
          cd ..
          rm -rf tmp-deploy

      # 8️⃣ Copy deployment package to GCP VM via SCP
      - name: Copy files to GCP VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.GCP_SSH_PASSPHRASE }}
          port: ${{ secrets.GCP_VM_PORT }}
          source: "backend/deploy-files.tar.gz"
          target: "/home/${{ secrets.GCP_VM_USERNAME }}/edu-hub-deploy"

      # 8️⃣ SSH into VM and deploy
      - name: Deploy on GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.GCP_SSH_PASSPHRASE }}
          port: ${{ secrets.GCP_VM_PORT }}
          script: |
            set -e

            DEPLOY_DIR="/home/${{ secrets.GCP_VM_USERNAME }}/edu-hub-deploy"
            cd "$DEPLOY_DIR"

            # Extract deployment files
            tar -xzf backend/deploy-files.tar.gz

            # Load Docker image
            docker load -i backend-image.tar

            # Stop and remove existing containers
            docker compose -f docker-compose.prod.yml down || true

            # Remove old container if exists
            docker rm -f edu-hub-backend || true

            # Pull latest image (use local from load)
            # Bring up services
            docker compose -f docker-compose.prod.yml up -d
            sleep 5
            docker ps

            # Cleanup old images (optional)
            docker image prune -f

            echo "Deployment completed successfully"

      - name: Show Docker image size in bytes
        run: |
          echo "Listing all Docker images:"
          docker images
          IMAGE_NAME=edu-hub-backend
          IMAGE_TAG=latest
          SIZE_BYTES=$(docker inspect ${IMAGE_NAME}:${IMAGE_TAG} --format='{{.Size}}')
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "Docker image size: ${SIZE_MB} MB"
